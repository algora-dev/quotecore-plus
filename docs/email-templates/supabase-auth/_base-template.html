<!--
  QuoteCore+ Base Email Template (reference only)
  Used as the design baseline for all Supabase Auth + transactional emails.

  Brand:
  - Wordmark "QuoteCore" + orange "+" superscript
  - Primary text: #0A0A0A
  - Muted text: #6B7280
  - Accent (CTA, +): #F97316
  - Background: #F9FAFB
  - Card: #FFFFFF, border #E5E7EB

  Width: 560px (mobile-safe).
  All CSS inline — many email clients strip <style>.
  Logo hosted at https://quotecore-plus-main.vercel.app/logo-email.png
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{TITLE}}</title>
  </head>
  <body style="margin:0;padding:0;background-color:#F9FAFB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#0A0A0A;-webkit-font-smoothing:antialiased;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F9FAFB;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;background-color:#FFFFFF;border:1px solid #E5E7EB;border-radius:12px;overflow:hidden;">
            <!-- Header -->
            <tr>
              <td style="padding:28px 32px 16px 32px;border-bottom:1px solid #F3F4F6;">
                <img src="https://quotecore-plus-main.vercel.app/logo-email.png" alt="QuoteCore+" width="160" height="auto" style="display:block;border:0;outline:none;text-decoration:none;height:auto;max-width:160px;" />
              </td>
            </tr>
            <!-- Content -->
            <tr>
              <td style="padding:32px;">
                <h1 style="margin:0 0 16px 0;font-size:22px;line-height:28px;font-weight:600;color:#0A0A0A;">{{HEADING}}</h1>
                <p style="margin:0 0 16px 0;font-size:15px;line-height:24px;color:#374151;">{{BODY_PARA_1}}</p>
                <p style="margin:0 0 28px 0;font-size:15px;line-height:24px;color:#374151;">{{BODY_PARA_2}}</p>
                <!-- CTA -->
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="background-color:#F97316;border-radius:8px;">
                      <a href="{{CTA_URL}}" style="display:inline-block;padding:12px 24px;font-size:15px;font-weight:600;color:#FFFFFF;text-decoration:none;border-radius:8px;">{{CTA_LABEL}}</a>
                    </td>
                  </tr>
                </table>
                <p style="margin:28px 0 0 0;font-size:13px;line-height:20px;color:#6B7280;">{{FALLBACK_TEXT}}</p>
                <p style="margin:8px 0 0 0;font-size:13px;line-height:20px;color:#6B7280;word-break:break-all;"><a href="{{CTA_URL}}" style="color:#F97316;text-decoration:none;">{{CTA_URL}}</a></p>
              </td>
            </tr>
            <!-- Footer -->
            <tr>
              <td style="padding:24px 32px;background-color:#F9FAFB;border-top:1px solid #F3F4F6;">
                <p style="margin:0 0 6px 0;font-size:12px;line-height:18px;color:#6B7280;">QuoteCore<span style="color:#F97316;">+</span> &mdash; Quoting &amp; job management for trades</p>
                <p style="margin:0;font-size:12px;line-height:18px;color:#9CA3AF;">Sent via QuoteCore+ &bull; <a href="mailto:info@quote-core.com" style="color:#9CA3AF;text-decoration:underline;">info@quote-core.com</a></p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
